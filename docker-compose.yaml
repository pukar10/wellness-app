services:
  postgres:
    image: docker.io/library/postgres:16-alpine
    container_name: wellness-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: wellness
      POSTGRES_PASSWORD: wellness
      POSTGRES_DB: wellness
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wellness -d wellness"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: docker.io/library/redis:7-alpine
    container_name: wellness-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
  redis_data: